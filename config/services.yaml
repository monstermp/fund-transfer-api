parameters:

services:
    _defaults:
        autowire: true
        autoconfigure: true

    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    # Predis client built from the REDIS_URL DSN in .env
    Predis\Client:
        arguments:
            - '%env(REDIS_URL)%'
